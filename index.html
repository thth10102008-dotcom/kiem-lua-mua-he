<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gặt Lúa Mùa Hè 2026 - Bản Đầy Đủ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* Giao diện chung */
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #f0f2f5; 
            margin: 0;
        }
        
        /* CSS cho chữ chạy */
        .header-chay { 
            background-color: #ffcc00; 
            color: #d9534f;
            padding: 15px 0; 
            font-size: 22px; 
            font-weight: bold; 
            overflow: hidden; 
            white-space: nowrap; 
        }
        .chu-chay { 
            display: inline-block; 
            padding-left: 100%;
            animation: move 12s linear infinite; 
        }
        @keyframes move { 
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); } 
        }
        
        /* Khung nội dung chính */
        .container { 
            margin-top: 50px; 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            display: inline-block; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        
        h2 { color: #333; }
        #balance-display { color: #28a745; font-size: 45px; font-weight: bold; margin: 20px 0; }
        
        /* Nút bấm Gặt Lúa */
        button { 
            padding: 15px 30px; 
            font-size: 20px; 
            font-weight: bold;
            cursor: pointer; 
            background-color: #ff9900; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            transition: 0.3s;
        }
        button:hover { background-color: #e68a00; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header-chay">
        <div class="chu-chay">🌾 CHÀO MỪNG ĐẾN VỚI MÙA GẶT LÚA 2026 - GẶT NHANH TAY, NHẬN NGAY LÚA ĐẦY KHO! 🌾</div>
    </div>

    <div class="container">
        <h2>Số dư tài khoản của bạn</h2>
        <div id="balance-display">Đang tải...</div>
        <button id="gat-btn">🌾 GẶT LÚA (Nhận 200đ)</button>
    </div>

    <script>
        // ==========================================
        // BƯỚC 1: DÁN CẤU HÌNH FIREBASE CỦA BẠN VÀO ĐÂY
        // ==========================================
        const firebaseConfig = {
            apiKey: "ĐIỀN_API_KEY_CỦA_BẠN_VÀO_ĐÂY",
            authDomain: "kiem-lua-mua-he.firebaseapp.com",
            projectId: "kiem-lua-mua-he",
            storageBucket: "kiem-lua-mua-he.appspot.com",
            messagingSenderId: "ĐIỀN_SENDER_ID",
            appId: "ĐIỀN_APP_ID"
        };

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // ==========================================
        // BƯỚC 2: ID NGƯỜI DÙNG (Document ID trong bảng users)
        // Dựa theo ảnh bạn chụp, mã ID đang là hPKv7iVziDGgzLMT1GeG
        // ==========================================
        const userId = "hPKv7iVziDGgzLMT1GeG"; 

        // ==========================================
        // BƯỚC 3: TỰ ĐỘNG CẬP NHẬT SỐ DƯ LIÊN TỤC
        // ==========================================
        db.collection("users").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById("balance-display").innerText = data.balance + "đ";
            } else {
                document.getElementById("balance-display").innerText = "0đ";
            }
        });

        // ==========================================
        // BƯỚC 4: XỬ LÝ NÚT GẶT TIỀN & CHỐNG SPAM
        // ==========================================
        const gatBtn = document.getElementById("gat-btn");
        
        gatBtn.addEventListener("click", () => {
            // Khóa nút 3 giây để chống bấm liên tục
            gatBtn.disabled = true; 
            gatBtn.innerText = "Đang gặt...";

            // Lệnh cộng 200đ vào Firebase
            db.collection("users").doc(userId).update({
                balance: firebase.firestore.FieldValue.increment(200)
            })
            .then(() => {
                alert("🎉 Gặt thành công 200đ!");
            })
            .catch((error) => {
                console.error("Lỗi: ", error);
                alert("Có lỗi xảy ra, hãy kiểm tra lại kết nối!");
            })
            .finally(() => {
                // Mở khóa nút trở lại sau 3 giây
                setTimeout(() => {
                    gatBtn.disabled = false;
                    gatBtn.innerText = "🌾 GẶT LÚA (Nhận 200đ)";
                }, 3000); 
            });
        });
    </script>
</body>
</html>
