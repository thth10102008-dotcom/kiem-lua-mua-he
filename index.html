<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiếm Lúa Mùa Hè - Gặt hái thu nhập</title>
    <!-- Thư viện biểu tượng -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* CSS phong cách hiện đại */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header img { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #f39c12; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .stats-container { display: flex; justify-content: space-between; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .stat-box { text-align: center; flex: 1; }
        .stat-box .label { font-size: 12px; color: #7f8c8d; }
        .stat-box .value { font-size: 18px; font-weight: bold; color: #27ae60; margin: 5px 0; }
        
        .task-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 5px 10px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #f39c12; }
        .task-info strong { display: block; font-size: 16px; }
        .task-info small { color: #95a5a6; }
        
        .btn-action { background: #f39c12; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-gathua { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <!-- Đảm bảo file logo.jpg đã được upload lên cùng thư mục với index.html -->
        <img src="logo.jpg" alt="Logo Kiếm Lúa Mùa Hè">
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <div class="label">Kho thóc</div>
            <div class="value">12.500đ</div>
        </div>
        <div class="stat-box">
            <div class="label">Nhiệm vụ còn</div>
            <div class="value">15</div>
        </div>
        <div class="stat-box">
            <div class="label">Đã gặt</div>
            <div class="value">42</div>
        </div>
    </div>

    <!-- Ví dụ nhiệm vụ -->
    <div class="task-card">
        <div class="task-info">
            <strong>Nhiệm vụ #01</strong>
            <small>Gặt 500đ từ link tài liệu</small>
        </div>
        <button class="btn-action" onclick="window.location.href='#'">Gặt ngay</button>
    </div>

    <button class="btn-gathua"><i class="fas fa-hand-holding-usd"></i> GẶT LÚA (RÚT TIỀN)</button>

</body>
</html>
