<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiếm Lúa Mùa Hè</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #f39c12; }
        .stats-container { display: flex; justify-content: space-between; background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-box { text-align: center; flex: 1; }
        .stat-box .value { font-size: 18px; font-weight: bold; color: #27ae60; }
        .task-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #f39c12; box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        .btn-action { background: #f39c12; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-gathua { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.jpg" alt="Logo">
    </div>

    <div class="stats-container">
        <div class="stat-box"><div>Kho thóc</div><div class="value">12.500đ</div></div>
        <div class="stat-box"><div>Nhiệm vụ còn</div><div class="value">15</div></div>
        <div class="stat-box"><div>Đã gặt</div><div class="value">42</div></div>
    </div>

    <div id="task-list"></div>

    <button class="btn-gathua"><i class="fas fa-hand-holding-usd"></i> GẶT LÚA (RÚT TIỀN)</button>

    <script>
        // --- DÁN LINK API CỦA BẠN VÀO ĐÂY ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbzr72fyJveUw1Z4s3yWw244VIqMP_jWpZoXfTcYuHdDp8mSvtF_Yl5VVPrxoSGXu1al/exec';
        
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('task-list');
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'task-card';
                    div.innerHTML = `
                        <div class="task-info">
                            <strong>${item.ten}</strong><br>
                            <small>Gặt ${item.soTien}đ</small>
                        </div>
                        <button class="btn-action" onclick="window.open('${item.link}', '_blank')">Gặt ngay</button>
                    `;
                    container.appendChild(div);
                });
            });
    </script>
</body>
</html>
