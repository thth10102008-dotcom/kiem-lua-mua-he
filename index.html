<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiếm Lúa Mùa Hè</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e824c, #e67e22); min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; padding: 15px; padding-bottom: 80px; }
        .card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn { background: #f39c12; border: none; padding: 10px 20px; border-radius: 12px; color: white; cursor: pointer; font-weight: bold; }
        .page { display: none; }
        .active-page { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: space-around; padding: 15px 0; border-top-left-radius: 25px; border-top-right-radius: 25px; }
        .nav-item { text-align: center; color: #bdc3c7; cursor: pointer; }
    </style>
</head>
<body>

    <!-- PHẦN ĐĂNG NHẬP -->
    <div id="auth-box" class="card" style="text-align:center;">
        <div id="user-info">Đang tải trạng thái...</div>
    </div>

    <!-- CÁC TRANG CHỨC NĂNG -->
    <div id="home" class="page active-page">
        <div style="text-align:center"><img src="logo.jpg" style="width:100px; border-radius:50%"></div>
        <div id="task-list"></div>
    </div>

    <div id="contact" class="page card">
        <h3>Hỗ trợ & Rút tiền</h3>
        <button class="btn" onclick="window.open('LINK_GOOGLE_FORM_CUA_BAN', '_blank')">Tạo lệnh rút tiền</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="switchTab('home')"><i class="fas fa-home"></i><br>Trang chủ</div>
        <div class="nav-item" onclick="switchTab('contact')"><i class="fas fa-user-circle"></i><br>Cá nhân</div>
    </div>

    <!-- SCRIPT CHÍNH -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDO6aflnNvi-yxR0SMTvrT_xEulQpyXM4w",
            authDomain: "kiem-lua-mua-he.firebaseapp.com",
            projectId: "kiem-lua-mua-he",
            storageBucket: "kiem-lua-mua-he.firebasestorage.app",
            messagingSenderId: "331960214215",
            appId: "1:331960214215:web:53b6c51bc04284091914e2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);
        window.switchTab = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        };

        onAuthStateChanged(auth, (user) => {
            const ui = document.getElementById('user-info');
            if (user) {
                ui.innerHTML = `Xin chào <b>${user.displayName}</b> <br> <button onclick="logout()">Đăng xuất</button>`;
            } else {
                ui.innerHTML = `<button onclick="login()">Đăng nhập bằng Google</button>`;
            }
        });

        // Nạp nhiệm vụ
        fetch('https://script.google.com/macros/s/AKfycbzr72fyJveUw1Z4s3yWw244VIqMP_jWpZoXfTcYuHdDp8mSvtF_Yl5VVPrxoSGXu1al/exec')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('task-list');
                data.forEach(item => {
                    list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between">
                        <div><b>${item.ten}</b><br>${item.soTien}đ</div>
                        <button class="btn" onclick="window.open('${item.link}', '_blank')">Gặt</button>
                    </div>`;
                });
            });
    </script>
</body>
</html>
