<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Thực Lấy Mã</title>
    <style>
        body { font-family: sans-serif; background: #F4F7FE; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 16px; text-align: center; width: 340px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #E2E8F0; }
        .timer { font-size: 55px; font-weight: bold; color: #EF4444; margin: 20px 0; }
        .captcha-box { display: none; margin-top: 15px; }
        canvas { border: 1px solid #CBD5E1; border-radius: 8px; margin-bottom: 10px; background: #F8FAFC; }
        .cap-input { width: 90%; padding: 12px; border: 1.5px solid #CBD5E1; border-radius: 8px; font-size: 16px; text-align: center; font-weight: bold;}
        .btn-cap { background: #1E3A8A; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;}
        .result-box { display: none; margin-top: 20px; }
        .code-display { font-size: 36px; font-weight: 900; color: #10B981; background: #ECFDF5; padding: 15px; border-radius: 8px; border: 2px dashed #34D399; letter-spacing: 5px;}
    </style>
</head>
<body>
    <div class="box" id="main-content">
        <h3 style="color: #1E3A8A; margin-top:0;">HỆ THỐNG LẤY MÃ</h3>
        <p id="status-text" style="color:#64748B;">Vui lòng không đóng trang này...</p>

        <div class="timer" id="countdown-timer">30</div>

        <div class="captcha-box" id="captcha-section">
            <canvas id="captchaCanvas" width="160" height="60"></canvas><br>
            <input type="text" id="captchaInput" class="cap-input" placeholder="Nhập chữ trong ảnh">
            <button class="btn-cap" onclick="verifyCaptcha()">XÁC NHẬN</button>
        </div>

        <div class="result-box" id="result-section">
            <p style="color: #64748B;">Mã của bạn đây. COPY nó nhé!</p>
            <div class="code-display" id="final-code"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('taskId');
        const activeId = localStorage.getItem('ve_nhiem_vu_active_id');
        const clickTime = localStorage.getItem('ve_nhiem_vu_active_time');
        const now = Date.now();
        let captchaText = ""; let secondsLeft = 30; 

        function showError(msg) {
            document.getElementById('main-content').innerHTML = `<h2 style="color: red;">${msg}</h2><p>Vui lòng quay lại trang chủ làm đàng hoàng!</p>`;
        }

        // BẮT GIAN LẬN TOOL & BOOKMARK BẰNG THỜI GIAN 15 GIÂY
        if (!taskId || !activeId || activeId !== taskId) {
            showError("LỖI XÁC THỰC! Mở sai liên kết.");
        } else if (now - parseInt(clickTime) < 15000) {
            showError("PHÁT HIỆN GIAN LẬN! Bạn vượt link quá nhanh (<15 giây). Mã bị khóa do nghi ngờ dùng Bookmark.");
            localStorage.removeItem('ve_nhiem_vu_active_id');
        } else {
            const interval = setInterval(() => {
                secondsLeft--;
                document.getElementById('countdown-timer').innerText = secondsLeft;
                if (secondsLeft <= 0) {
                    clearInterval(interval);
                    document.getElementById('countdown-timer').style.display = 'none';
                    document.getElementById('status-text').style.display = 'none';
                    document.getElementById('captcha-section').style.display = 'block';
                    drawCaptcha();
                }
            }, 1000);
        }

        function drawCaptcha() {
            const canvas = document.getElementById('captchaCanvas'); const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#F8FAFC"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; captchaText = "";
            for(let i=0; i<5; i++) captchaText += chars[Math.floor(Math.random() * chars.length)];
            ctx.font = "bold 28px sans-serif"; ctx.fillStyle = "#1E3A8A";
            for(let i=0; i<captchaText.length; i++) {
                ctx.save(); ctx.translate(20 + i * 25, 40); ctx.rotate((Math.random() - 0.5) * 0.4); ctx.fillText(captchaText[i], 0, 0); ctx.restore();
            }
        }

        function verifyCaptcha() {
            if(document.getElementById('captchaInput').value.trim().toUpperCase() !== captchaText) {
                alert("❌ Sai Captcha!"); drawCaptcha(); return;
            }
            
            localStorage.removeItem('ve_nhiem_vu_active_id');
            const rewardCode = Math.floor(100000 + Math.random() * 900000).toString();
            localStorage.setItem('hash_code_' + taskId, btoa(taskId + "_MAMAT_" + rewardCode));

            document.getElementById('captcha-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('final-code').innerText = rewardCode;
        }
    </script>
</body>
</html>
