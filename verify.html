<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Kiểm Tra Xác Thực Tự Động</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F4F7FE; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px 30px; border-radius: 20px; text-align: center; width: 360px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #E2E8F0; }
        .loader { border: 4px solid #E2E8F0; border-top: 4px solid #1E3A8A; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-msg { font-size: 15px; color: #64748B; font-weight: 500; line-height: 1.6; margin-top: 15px;}
        .btn-home { display: none; background: #1E3A8A; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; text-decoration: none;}
    </style>
</head>
<body>
    <div class="box" id="content-box">
        <h2 id="title-status" style="color: #1E3A8A; margin: 0; font-size:22px;">ĐANG KIỂM TRA PHIÊN</h2>
        <div class="loader" id="spinner"></div>
        <p class="status-msg" id="msg-status">Hệ thống đang thực hiện quét dữ liệu bảo mật vượt link, vui lòng không tắt tab này...</p>
        <button class="btn-home" id="btn-back" onclick="window.close()">ĐÓNG TRANG VÀ QUAY LẠI</button>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1hP042D5mQFWTxqaVXDVDvCFX5clpUJ4Ej1tf4d26H5XvPptMRwEqPOE86u3NqwbK/exec'; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const titleEl = document.getElementById('title-status');
        const spinnerEl = document.getElementById('spinner');
        const msgEl = document.getElementById('msg-status');
        const btnEl = document.getElementById('btn-back');

        if (!token) {
            titleEl.innerText = "❌ TỪ CHỐI TRUY CẬP"; titleEl.style.color = "#EF4444";
            spinnerEl.style.display = "none";
            msgEl.innerText = "Không phát hiện mã phiên xác thực. Bạn không thể truy cập trực tiếp trang này.";
        } else {
            fetch(`${SCRIPT_URL}?action=verifyToken&token=${encodeURIComponent(token)}`)
            .then(res => res.json()).then(data => {
                spinnerEl.style.display = "none"; btnEl.style.display = "block";
                if (data.status === 'success') {
                    titleEl.innerText = "✅ THÀNH CÔNG!"; titleEl.style.color = "#10B981";
                    msgEl.innerHTML = `<b style="color:#0F172A;">${data.message}</b><br><br>Hệ thống đã ghi nhận thành công, số dư của bạn đã được cập nhật tự động!`;
                } else {
                    titleEl.innerText = "🚫 THẤT BẠI!"; titleEl.style.color = "#EF4444";
                    msgEl.innerText = data.message;
                }
            }).catch(() => {
                spinnerEl.style.display = "none"; btnEl.style.display = "block";
                titleEl.innerText = "💥 LỖI KẾT NỐI"; titleEl.style.color = "#EF4444";
                msgEl.innerText = "Đường truyền kết nối mạng bị gián đoạn.";
            });
        }
    </script>
</body>
</html>
